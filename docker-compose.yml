services:
  openclaw-gateway:
    build:
      context: .
      args:
        - OPENCLAW_DOCKER_APT_PACKAGES=${OPENCLAW_DOCKER_APT_PACKAGES:-}
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: root
    environment:
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: "PicoOpen_MasterKey_2024_Secure_Fixed"
      WEBUI_NAME: "OpenClaw Brain"
      JUPYTER_TOKEN: "PicoOpen_MasterKey_2024_Secure_Fixed"
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      PI_AI_ANTIGRAVITY_VERSION: ${PI_AI_ANTIGRAVITY_VERSION:-1.15.8}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command: [ "node", "dist/index.js", "gateway", "--bind", "${OPENCLAW_GATEWAY_BIND:-lan}", "--port", "18789", "--allow-unconfigured" ]

  openclaw-gateway-lab:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: node
    environment:
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: "PicoOpen_MasterKey_2024_Secure_Fixed"
      WEBUI_NAME: "OpenClaw Brain (Lab)"
      JUPYTER_TOKEN: "PicoOpen_MasterKey_2024_Secure_Fixed"
      TELEGRAM_BOT_TOKEN_LAB: ${TELEGRAM_BOT_TOKEN_LAB}
      TERM: xterm-256color
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD_LAB}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN_LAB}
      HOME: /home/node
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      CODEX_MODEL: ${CODEX_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_URL: ${OPENROUTER_API_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
    volumes:
      - /home/deploy/openclaw/mcp:/home/node/mcp:ro
      - /home/deploy/.openclaw-lab:/home/node/.openclaw
    ports:
      - "127.0.0.1:28789:18789"
      - "127.0.0.1:28790:18790"
    init: true
    restart: unless-stopped
    command: [ "node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured" ]

  openclaw-cli:
    build:
      context: .
      args:
        - OPENCLAW_DOCKER_APT_PACKAGES=${OPENCLAW_DOCKER_APT_PACKAGES:-}
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true
    init: true
    entrypoint: [ "node", "dist/index.js" ]

