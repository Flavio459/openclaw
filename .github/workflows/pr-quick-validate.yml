name: PR Quick Validate

on:
  pull_request:
    paths:
      - ".claude/**"
      - ".github/workflows/pr-quick-validate.yml"
      - "scripts/pema/**"
      - "ui/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quick-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Show pnpm version
        run: pnpm -v

      - name: Install dependencies
        env:
          CI: true
        run: |
          pnpm install --frozen-lockfile --ignore-scripts=false \
            --config.engine-strict=false \
            --config.enable-pre-post-scripts=true

      - name: Validate Claude hooks
        run: pnpm test:claude-hooks

      - name: Validate Collegium UI slice
        run: |
          pnpm --dir ui test -- \
            src/ui/collegium.test.ts \
            src/ui/collegium-domain.test.ts \
            src/ui/collegium-domain.projections.test.ts \
            src/ui/views/command.test.ts \
            src/ui/views/forum.test.ts

      - name: Build control UI
        run: pnpm --dir ui build
